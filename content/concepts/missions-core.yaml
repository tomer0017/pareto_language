    kind: phrase
    gloss: { en: "Sorry, I don't understand.", he: "סליחה, אני לא מבין." }
    categories: [recovery]
    rof: 3
    layer: 1
    skillTarget: fluent
    role: recovery
    realizations:
      en: { text: "Sorry, I don't understand.", quality: ai_reviewed }
      es: { text: "Perdón, no entiendo.", quality: draft, reviewNotes: "MT draft — native review needed" }
      fr: { text: "Désolé, je ne comprends pas.", quality: draft, reviewNotes: "MT draft — native review needed" }
