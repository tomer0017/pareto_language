# Mission concepts — canonical meanings behind the Bootcamp missions (Sprint 8).
# English realization is playable (ai_reviewed); es/fr/it/ar are DRAFT machine-assisted
# translations, each flagged for native review. No fake "native_reviewed". Seeded via the
# pipeline (npm run seed:concepts / seed:all) — idempotent upsert by concept id.
concepts:
